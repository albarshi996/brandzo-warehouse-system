<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>BFP — دليل هيكلة الدورة المستندية المخزنية — ERP</title>
    <style>
        :root {
            --bfp-red: #c0392b;
            --bfp-darkred: #8b1a1a;
            --bfp-gold: #e8b830;
            --bfp-dark: #1a1a2e;
            --bfp-light: #f8f9fa;
            --bfp-gray: #6c757d;
            --bfp-border: #dee2e6;
            --bfp-blue: #1B3A6B;
            --bfp-teal: #0D4F3C;
            --bfp-purple: #4E2A84;
            --bfp-green: #145A32;
            --paper: #fffef9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', 'Noto Naskh Arabic', sans-serif;
            background: #e9ecef;
            color: #212529;
            line-height: 1.7;
            font-size: 11pt;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            scroll-behavior: smooth;
        }

        .page-wrapper {
            max-width: 100%;
            width: 100%;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.15);
        }

        @media screen and (min-width: 769px) {
            .page-wrapper {
                max-width: 210mm;
            }
        }

        /* ── COVER PAGE ──────────────────────────── */
        .cover {
            background: linear-gradient(160deg, #1a0a0a 0%, #2d0f0f 30%, #c0392b 70%, #8b1a1a 100%);
            color: #fff;
            padding: 30px 20px;
            text-align: center;
            page-break-after: always;
            position: relative;
            overflow: hidden;
            min-height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        @media screen and (min-width: 769px) {
            .cover {
                padding: 50px 40px 40px;
                min-height: 100vh;
            }
        }
        
        .cover::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 250px;
            height: 250px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }
        
        @media screen and (min-width: 769px) {
            .cover::before {
                top: -120px;
                right: -120px;
                width: 500px;
                height: 500px;
            }
        }
        
        .cover::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: -40px;
            width: 180px;
            height: 180px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 50%;
        }
        
        @media screen and (min-width: 769px) {
            .cover::after {
                bottom: -80px;
                left: -80px;
                width: 350px;
                height: 350px;
            }
        }

        .bfp-logo-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        
        @media screen and (min-width: 769px) {
            .bfp-logo-wrapper {
                gap: 18px;
                margin-bottom: 10px;
                flex-wrap: nowrap;
            }
        }
        
        .bfp-circle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.35), rgba(220,40,40,0.7) 60%, rgba(140,20,20,0.9));
            box-shadow:
                0 0 20px rgba(255, 60, 60, 0.4),
                inset 0 0 15px rgba(255, 255, 255, 0.3),
                0 4px 16px rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(6px);
            position: relative;
        }
        
        @media screen and (min-width: 769px) {
            .bfp-circle {
                width: 140px;
                height: 140px;
                box-shadow:
                    0 0 30px rgba(255, 60, 60, 0.5),
                    inset 0 0 25px rgba(255, 255, 255, 0.3),
                    0 8px 32px rgba(0, 0, 0, 0.4);
                border: 3px solid rgba(255, 255, 255, 0.5);
            }
        }
        
        .bfp-circle::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 15px;
            width: 25px;
            height: 12px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            transform: rotate(-20deg);
        }
        
        @media screen and (min-width: 769px) {
            .bfp-circle::after {
                top: 12px;
                left: 25px;
                width: 40px;
                height: 20px;
            }
        }
        
        .bfp-circle span {
            color: #fff;
            font-size: 28pt;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 2;
        }
        
        @media screen and (min-width: 769px) {
            .bfp-circle span {
                font-size: 48pt;
                letter-spacing: 4px;
            }
        }
        
        .brandzo-red {
            color: #ff2d2d;
            font-size: 22pt;
            font-weight: 900;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(180, 0, 0, 0.6);
            position: relative;
            z-index: 1;
        }
        
        @media screen and (min-width: 769px) {
            .brandzo-red {
                font-size: 42pt;
                letter-spacing: 2px;
                text-shadow: 0 2px 12px rgba(180, 0, 0, 0.6);
            }
        }
        
        .franchise-sub {
            display: block;
            color: #222;
            font-size: 9pt;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: -6px;
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.7);
            padding: 2px 12px;
            border-radius: 12px;
        }
        
        @media screen and (min-width: 769px) {
            .franchise-sub {
                font-size: 10pt;
                margin-top: -8px;
                padding: 2px 14px;
            }
        }
        
        .cover-divider {
            width: 60px;
            height: 3px;
            background: #e8b830;
            margin: 12px auto;
            position: relative;
            z-index: 1;
        }
        
        @media screen and (min-width: 769px) {
            .cover-divider {
                width: 100px;
                margin: 20px auto;
            }
        }
        
        .cover-subtitle {
            font-size: 11pt;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            letter-spacing: 0.5px;
            line-height: 1.6;
        }
        
        @media screen and (min-width: 769px) {
            .cover-subtitle {
                font-size: 14pt;
                margin-bottom: 12px;
                letter-spacing: 1px;
            }
        }
        
        .cover-flow {
            font-size: 9pt;
            font-weight: 600;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.12);
            padding: 8px 14px;
            border-radius: 30px;
            display: inline-block;
            margin: 6px 0 14px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.25);
        }
        
        @media screen and (min-width: 769px) {
            .cover-flow {
                font-size: 12pt;
                letter-spacing: 2px;
                padding: 10px 22px;
                margin: 8px 0 20px;
            }
        }
        
        .cover-badge {
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 8pt;
            margin: 4px;
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.08);
        }
        
        @media screen and (min-width: 769px) {
            .cover-badge {
                padding: 6px 18px;
                font-size: 9pt;
                margin: 6px;
            }
        }
        
        .cover-meta {
            position: relative;
            z-index: 1;
            font-size: 9pt;
            opacity: 0.85;
            line-height: 1.8;
            margin-top: 15px;
        }
        
        @media screen and (min-width: 769px) {
            .cover-meta {
                font-size: 10pt;
                line-height: 2;
                margin-top: 25px;
            }
        }

        /* ── TOC ──────────────────────────────────── */
        .toc {
            padding: 20px 15px;
            page-break-after: always;
            background: #fffef9;
        }
        
        @media screen and (min-width: 769px) {
            .toc {
                padding: 30px 40px;
            }
        }
        
        .toc h2 {
            color: #c0392b;
            font-size: 15pt;
            border-bottom: 3px solid #e8b830;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        
        @media screen and (min-width: 769px) {
            .toc h2 {
                font-size: 18pt;
                margin-bottom: 20px;
            }
        }
        
        .toc-list {
            list-style: none;
            columns: 1;
            column-gap: 20px;
        }
        
        @media screen and (min-width: 769px) {
            .toc-list {
                columns: 2;
                column-gap: 30px;
            }
        }
        
        .toc-list li {
            padding: 6px 0;
            border-bottom: 1px dotted #dee2e6;
            break-inside: avoid;
            font-size: 9pt;
        }
        
        @media screen and (min-width: 769px) {
            .toc-list li {
                padding: 7px 0;
                font-size: 10pt;
            }
        }
        
        .toc-list li::before {
            content: '📄 ';
            font-size: 8pt;
        }
        
        @media screen and (min-width: 769px) {
            .toc-list li::before {
                font-size: 9pt;
            }
        }
        
        .toc-list a {
            text-decoration: none;
            color: #212529;
            display: block;
            transition: all 0.2s;
        }
        .toc-list a:hover {
            color: #c0392b;
            font-weight: 700;
            padding-right: 6px;
        }
        .toc-num {
            display: inline-block;
            background: #c0392b;
            color: #fff;
            width: 20px;
            height: 20px;
            text-align: center;
            border-radius: 50%;
            font-size: 8pt;
            line-height: 20px;
            margin-left: 6px;
            font-weight: bold;
        }
        
        @media screen and (min-width: 769px) {
            .toc-num {
                width: 24px;
                height: 24px;
                font-size: 9pt;
                line-height: 24px;
                margin-left: 8px;
            }
        }

        /* ── SECTIONS ──────────────────────────────── */
        .section {
            padding: 15px 12px;
            page-break-before: always;
            background: #fffef9;
        }
        .section:first-of-type {
            page-break-before: auto;
        }
        
        @media screen and (min-width: 769px) {
            .section {
                padding: 25px 35px;
            }
        }
        
        .section h2 {
            font-size: 13pt;
            color: #fff;
            background: #c0392b;
            padding: 10px 12px;
            border-radius: 8px 8px 0 0;
            margin: -15px -12px 15px -12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        @media screen and (min-width: 769px) {
            .section h2 {
                font-size: 16pt;
                padding: 12px 20px;
                margin: -25px -35px 20px -35px;
                gap: 10px;
            }
        }
        
        .section h3 {
            color: #8b1a1a;
            font-size: 11pt;
            margin: 14px 0 8px;
            border-right: 3px solid #e8b830;
            padding-right: 10px;
        }
        
        @media screen and (min-width: 769px) {
            .section h3 {
                font-size: 13pt;
                margin: 18px 0 10px;
                border-right: 4px solid #e8b830;
                padding-right: 12px;
            }
        }
        
        .section h4 {
            color: #4E2A84;
            font-size: 10pt;
            margin: 10px 0 5px;
        }
        
        @media screen and (min-width: 769px) {
            .section h4 {
                font-size: 11pt;
                margin: 12px 0 6px;
            }
        }

        /* ── TABLES ────────────────────────────────── */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0 14px;
            font-size: 8pt;
            page-break-inside: avoid;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border-radius: 6px;
            overflow-x: auto;
            display: block;
            -webkit-overflow-scrolling: touch;
        }
        
        @media screen and (min-width: 769px) {
            table {
                font-size: 9pt;
                margin: 12px 0 18px;
                display: table;
                overflow-x: visible;
            }
        }
        
        table th {
            background: #c0392b;
            color: #fff;
            padding: 7px 6px;
            text-align: center;
            font-weight: 600;
            font-size: 7.5pt;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }
        
        @media screen and (min-width: 769px) {
            table th {
                padding: 9px 8px;
                font-size: 8.5pt;
                letter-spacing: 0.3px;
            }
        }
        
        table td {
            padding: 6px 6px;
            border: 1px solid #dee2e6;
            text-align: center;
            vertical-align: middle;
            white-space: nowrap;
        }
        
        @media screen and (min-width: 769px) {
            table td {
                padding: 7px 8px;
            }
        }
        
        table tr:nth-child(even) td {
            background: #f8f9fa;
        }
        table tr:hover td {
            background: #e9f2fa;
        }
        .col-ar {
            text-align: right;
        }
        .col-en {
            text-align: left;
            direction: ltr;
        }
        .tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 7pt;
            font-weight: 600;
            white-space: nowrap;
        }
        
        @media screen and (min-width: 769px) {
            .tag {
                padding: 2px 8px;
                font-size: 8pt;
            }
        }
        
        .tag-green {
            background: #d4edda;
            color: #145A32;
        }
        .tag-yellow {
            background: #fff3cd;
            color: #7E5109;
        }
        .tag-red {
            background: #f8d7da;
            color: #9B1C1C;
        }
        .tag-blue {
            background: #d1ecf1;
            color: #1B3A6B;
        }
        .tag-purple {
            background: #e8d5f5;
            color: #4E2A84;
        }
        .tag-teal {
            background: #c8e6d9;
            color: #0D4F3C;
        }

        /* ── CODE ──────────────────────────────────── */
        code {
            background: #f1f3f5;
            color: #9B1C1C;
            padding: 1px 4px;
            border-radius: 3px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 8pt;
            direction: ltr;
            display: inline-block;
        }
        
        @media screen and (min-width: 769px) {
            code {
                padding: 2px 6px;
                font-size: 9pt;
            }
        }
        
        pre {
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 7pt;
            line-height: 1.4;
            direction: ltr;
            text-align: left;
            page-break-inside: avoid;
            margin: 8px 0;
            border-right: 4px solid #e8b830;
            -webkit-overflow-scrolling: touch;
        }
        
        @media screen and (min-width: 769px) {
            pre {
                padding: 16px;
                font-size: 8.5pt;
                line-height: 1.5;
                margin: 10px 0;
            }
        }

        /* ── CALLOUT BOXES ────────────────────────── */
        .callout {
            padding: 10px 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 9pt;
            page-break-inside: avoid;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        
        @media screen and (min-width: 769px) {
            .callout {
                padding: 14px 18px;
                margin: 14px 0;
                font-size: 10pt;
                gap: 10px;
            }
        }
        
        .callout-info {
            background: #e8f4fd;
            border-right: 4px solid #2E75B6;
            color: #1B3A6B;
        }
        
        @media screen and (min-width: 769px) {
            .callout-info {
                border-right: 5px solid #2E75B6;
            }
        }
        
        .callout-warning {
            background: #fff8e5;
            border-right: 4px solid #e8b830;
            color: #7E5109;
        }
        
        @media screen and (min-width: 769px) {
            .callout-warning {
                border-right: 5px solid #e8b830;
            }
        }
        
        .callout-danger {
            background: #fdecea;
            border-right: 4px solid #9B1C1C;
            color: #7b1515;
        }
        
        @media screen and (min-width: 769px) {
            .callout-danger {
                border-right: 5px solid #9B1C1C;
            }
        }
        
        .callout-success {
            background: #e6f4ea;
            border-right: 4px solid #145A32;
            color: #0D4F3C;
        }
        
        @media screen and (min-width: 769px) {
            .callout-success {
                border-right: 5px solid #145A32;
            }
        }
        
        .callout-icon {
            font-size: 14pt;
            flex-shrink: 0;
        }
        
        @media screen and (min-width: 769px) {
            .callout-icon {
                font-size: 18pt;
            }
        }

        /* ── FLOW GRID ─────────────────────────────── */
        .flow-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin: 12px 0;
            page-break-inside: avoid;
        }
        
        @media screen and (min-width: 500px) and (max-width: 768px) {
            .flow-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media screen and (min-width: 769px) {
            .flow-grid {
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 10px;
                margin: 16px 0;
            }
        }
        
        .flow-card {
            background: #fff;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            padding: 10px 8px;
            text-align: center;
            font-size: 8pt;
            transition: all 0.2s;
            position: relative;
        }
        
        @media screen and (min-width: 769px) {
            .flow-card {
                padding: 14px 10px;
                font-size: 9pt;
            }
        }
        
        .flow-card.master {
            border-color: #2E75B6;
            background: #f0f6fb;
        }
        .flow-card.transaction {
            border-color: #0D4F3C;
            background: #f2f9f5;
        }
        .flow-card.report {
            border-color: #4E2A84;
            background: #f7f2fa;
        }
        .flow-card .icon {
            font-size: 16pt;
            display: block;
            margin-bottom: 3px;
        }
        
        @media screen and (min-width: 769px) {
            .flow-card .icon {
                font-size: 22pt;
                margin-bottom: 4px;
            }
        }
        
        .flow-card .flow-title {
            font-weight: 700;
            color: #1B3A6B;
        }
        .flow-card .flow-sub {
            font-size: 7pt;
            color: #6c757d;
        }
        
        @media screen and (min-width: 769px) {
            .flow-card .flow-sub {
                font-size: 8pt;
            }
        }

        /* ── KPI CARDS ─────────────────────────────── */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin: 10px 0;
            page-break-inside: avoid;
        }
        
        @media screen and (max-width: 480px) {
            .kpi-row {
                grid-template-columns: 1fr;
            }
        }
        
        @media screen and (min-width: 769px) {
            .kpi-row {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
                margin: 14px 0;
            }
        }
        
        .kpi-card {
            background: #fff;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border-top: 4px solid #c0392b;
        }
        
        @media screen and (min-width: 769px) {
            .kpi-card {
                padding: 14px;
            }
        }
        
        .kpi-card.green {
            border-top-color: #145A32;
        }
        .kpi-card.amber {
            border-top-color: #e8b830;
        }
        .kpi-card.red {
            border-top-color: #9B1C1C;
        }
        .kpi-card .kpi-value {
            font-size: 16pt;
            font-weight: 900;
            color: #c0392b;
        }
        
        @media screen and (min-width: 769px) {
            .kpi-card .kpi-value {
                font-size: 22pt;
            }
        }
        
        .kpi-card .kpi-label {
            font-size: 8pt;
            color: #6c757d;
            margin-top: 2px;
        }
        
        @media screen and (min-width: 769px) {
            .kpi-card .kpi-label {
                font-size: 9pt;
            }
        }

        /* ── HOME BUTTON ──────────────────────────── */
        .home-btn {
            display: inline-block;
            background: #c0392b;
            color: #fff !important;
            padding: 8px 16px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 9pt;
            font-weight: 700;
            margin: 8px 0;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            text-align: center;
            min-height: 44px;
            min-width: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        @media screen and (min-width: 769px) {
            .home-btn {
                padding: 8px 18px;
                font-size: 10pt;
                margin: 10px 0;
                min-height: auto;
                min-width: auto;
            }
        }
        
        .home-btn:hover {
